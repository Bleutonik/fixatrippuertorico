<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Your Experience | Fix A Trip Puerto Rico</title>
  <meta name="description" content="Book your Puerto Rico experience with Fix A Trip. Tours, boat charters, private chefs, luxury transport and wellness.">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a; max-width: 560px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    label { display: block; font-weight: 600; margin-top: 1rem; margin-bottom: 0.25rem; }
    input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 0.5rem; font-size: 1rem; box-sizing: border-box; }
    .consent-box { border: 1px solid #e5e5e5; border-radius: 0.75rem; padding: 1rem; margin-top: 1.5rem; background: #fafafa; }
    .consent-box label { font-weight: 400; font-size: 0.875rem; display: inline; }
    .consent-box input[type="checkbox"] { width: auto; margin-right: 0.5rem; vertical-align: middle; }
    .required-note { font-size: 0.75rem; color: #666; margin-top: 0.5rem; }
    a { color: #2563eb; }
    .btn { display: block; width: 100%; padding: 0.875rem; margin-top: 1.5rem; border: none; border-radius: 0.75rem; font-size: 1rem; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; color: #fff; }
    .btn-whatsapp { background: #25D366; }
    .btn-call { background: transparent; color: #1a1a1a; border: 1px solid #ccc; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <h1>Book Your Experience</h1>
  <p>Fill out the form and we'll get in touch to confirm your booking.</p>

  <form>
    <label for="name">Full name *</label>
    <input type="text" id="name" name="name" required placeholder="Your name">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="email@example.com">

    <label for="phone">Phone number *</label>
    <input type="tel" id="phone" name="phone" required placeholder="+1 (787) 000-0000">

    <label for="guests">Number of guests</label>
    <input type="number" id="guests" name="guests" min="1" placeholder="2">

    <label for="notes">Additional notes</label>
    <textarea id="notes" name="notes" rows="3" placeholder="Tours of interest, special preferences..."></textarea>

    <div class="consent-box">
      <input type="checkbox" id="sms-consent" name="sms-consent" required>
      <label for="sms-consent">
        I agree to receive SMS text messages from Fix A Trip PR at the number provided above regarding booking confirmations, activity reminders, trip updates, and follow-up messages. Message &amp; data rates may apply. Reply STOP to unsubscribe at any time. View our <a href="/privacy-policy.html">Privacy Policy</a>.
      </label>
      <p class="required-note">(This field is required to complete your booking.)</p>
    </div>

    <a href="https://wa.me/17873700218" class="btn btn-whatsapp">Book via WhatsApp</a>
    <a href="tel:+17873700218" class="btn btn-call">Call to Book</a>
  </form>

  <p style="font-size:0.75rem;text-align:center;color:#999;margin-top:1.5rem;">No charges until availability is confirmed. Free cancellation.</p>
</body>
</html>
