<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Your Experience | Fix A Trip Puerto Rico</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 560px; margin: 0 auto; padding: 40px 20px; color: #1a1a1a; background: #fff; }
    h1 { font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 36px; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 5px; margin-top: 18px; }
    input, textarea, select { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; color: #1a1a1a; outline: none; transition: border 0.2s; }
    input:focus, textarea:focus { border-color: #0066cc; }
    textarea { min-height: 80px; resize: vertical; }
    .consent-box { background: #f8faff; border: 1px solid #c0d8f5; border-radius: 10px; padding: 16px; margin-top: 24px; display: flex; align-items: flex-start; gap: 12px; }
    .consent-box input[type="checkbox"] { width: 18px; height: 18px; min-width: 18px; margin-top: 3px; cursor: pointer; accent-color: #0066cc; }
    .consent-text { font-size: 0.88rem; line-height: 1.6; color: #333; }
    .consent-text a { color: #0066cc; }
    .consent-required { font-size: 0.78rem; color: #888; margin-top: 4px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; margin-top: 12px; text-decoration: none; }
    .btn-whatsapp { background: #25D366; color: white; }
    .btn-call { background: #fff; color: #1a1a1a; border: 1.5px solid #ddd; }
    .btn:hover { opacity: 0.9; }
    .note { text-align: center; font-size: 0.8rem; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Book Your Experience</h1>
  <p class="subtitle">Fill out the form and we'll confirm your booking via WhatsApp or phone.</p>

  <form id="bookingForm" onsubmit="handleSubmit(event)">
    <label for="name">Full name *</label>
    <input type="text" id="name" name="name" placeholder="Your name" required />

    <label for="email">Email address</label>
    <input type="email" id="email" name="email" placeholder="email@example.com" />

    <label for="phone">Phone number *</label>
    <input type="tel" id="phone" name="phone" placeholder="+1 (787) 000-0000" required />

    <label for="date">Preferred date</label>
    <input type="date" id="date" name="date" min="" />

    <label for="guests">Number of guests</label>
    <input type="number" id="guests" name="guests" placeholder="2" min="1" />

    <label for="notes">Additional notes</label>
    <textarea id="notes" name="notes" placeholder="Tours of interest, special preferences..."></textarea>

    <!-- SMS Consent Checkbox — required for A2P 10DLC compliance -->
    <div class="consent-box">
      <input type="checkbox" id="sms-consent" name="sms-consent" />
      <div>
        <label for="sms-consent" class="consent-text" style="margin:0;font-weight:400;">
          I agree to receive SMS text messages from Fix A Trip PR at the number provided above regarding booking confirmations, activity reminders, trip updates, and follow-up messages. Message &amp; data rates may apply. Reply STOP to unsubscribe at any time. Reply HELP for help. View our <a href="/privacy-policy">Privacy Policy</a>.
        </label>
        <p class="consent-required">(This field is required to complete your booking.)</p>
      </div>
    </div>

    <button type="submit" class="btn btn-whatsapp" style="margin-top:24px;">
      📱 Book via WhatsApp
    </button>
  </form>

  <a href="tel:+17874880202" class="btn btn-call">📞 Call to Book: (787) 488-0202</a>

  <p class="note">No charges until availability is confirmed. Free cancellation.</p>

  <script>
    document.getElementById('date').min = new Date().toISOString().split('T')[0];

    function handleSubmit(e) {
      e.preventDefault();
      const consent = document.getElementById('sms-consent').checked;
      if (!consent) {
        alert('Please check the SMS consent box to proceed with your booking.');
        return;
      }
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const date = document.getElementById('date').value;
      const guests = document.getElementById('guests').value;
      const notes = document.getElementById('notes').value;
      const msg = encodeURIComponent(
        `Hello! I'd like to book an experience:\n\n` +
        `Name: ${name}\nEmail: ${email}\nPhone: ${phone}\n` +
        `Date: ${date || 'Not selected'}\nGuests: ${guests || 'Not specified'}\n` +
        `Notes: ${notes || 'None'}\n\nSMS Consent: Yes`
      );
      window.open(`https://wa.me/17874880202?text=${msg}`, '_blank');
    }
  </script>
</body>
</html>
